<!DOCTYPE html>
{% load static %}
<html>
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <meta content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no' name='viewport'>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet"/>
    <link href="{% static 'css/font-awesome.min.css' %}" rel="stylesheet"/>
    <link href="{% static 'css/AdminLTE.css' %}" rel="stylesheet"/>
    <style>
        body { background:#d2d6de; }
        .login-box { width:360px; margin:8% auto; }
        .login-logo { text-align:center; font-size:35px; margin-bottom:25px; }
        .login-logo a { color:#444; text-decoration:none; }
        .login-box-body { background:#fff; padding:30px; border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,.15); }
        .login-box-msg { text-align:center; margin-bottom:20px; color:#666; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="login-logo"><a href="#"><b>Admin</b>LTE</a></div>
    <div class="login-box-body">
        <p class="login-box-msg">Connectez-vous pour continuer</p>
        {% if error %}
        <div class="alert alert-danger"><i class="fa fa-warning"></i> {{ error }}</div>
        {% endif %}
        <form method="POST" action="{% url 'dash_admin:login' %}">
            {% csrf_token %}
            <div class="form-group has-feedback">
                <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required autofocus>
                <span class="glyphicon glyphicon-user form-control-feedback"></span>
            </div>
            <div class="form-group has-feedback">
                <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
                <span class="glyphicon glyphicon-lock form-control-feedback"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-flat">
                <i class="fa fa-sign-in"></i> Se connecter
            </button>
        </form>
    </div>
</div>
<script src="http://ajax.googleapis.com/ajax/libs/jquery/2.0.2/jquery.min.js"></script>
<script src="{% static 'js/bootstrap.min.js' %}"></script>
</body>
</html>
